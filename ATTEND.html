<!DOCTYPE html>
<html>

<head>

<title>CBC Examination System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#002147;
color:white;
padding:25px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:40px;
}

.card{
padding:40px;
border-radius:10px;
color:white;
text-align:center;
font-size:18px;
}

.card a{
color:white;
text-decoration:none;
}

.card:hover{
transform:scale(1.05);
}

.c1{background:#1abc9c;}
.c2{background:#3498db;}
.c3{background:#9b59b6;}
.c4{background:#e67e22;}
.c5{background:#2ecc71;}
.c6{background:#34495e;}
.c7{background:#e74c3c;}
.c8{background:#16a085;}

</style>

</head>

<body>

<header>

<h1>Kitere CBC Examination Management System</h1>

</header>

</div>

</body>
</html>
