<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Timetable</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        padding: 40px;
    }
    h2 {
        text-align: center;
        color: #003366;
        margin-bottom: 30px;
    }
    form {
        max-width: 600px;
        margin: auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    label {
        font-weight: bold;
    }
    input[type="text"], select {
        width: 100%;
        padding: 12px;
        margin: 12px 0 20px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    input[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #003366;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        border-radius: 6px;
    }
    input[type="submit"]:hover {
        background: #001f4d;
    }
</style>
</head>
<body>

<h2>Add Class Timetable</h2>

<form action="TIME_TABLE.PHP" method="POST">
    <label>Class/Level:</label>
    <input type="text" name="class_level" placeholder="Enter class/level" required>

    <label>Day of Week:</label>
    <select name="day" required>
        <option value="">--Select Day--</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
    </select>

    <label>Period 1:</label>
    <input type="text" name="period1" placeholder="Enter subject/teacher" required>

    <label>Period 2:</label>
    <input type="text" name="period2" placeholder="Enter subject/teacher" required>

    <label>Period 3:</label>
    <input type="text" name="period3" placeholder="Enter subject/teacher" required>

    <label>Period 4:</label>
    <input type="text" name="period4" placeholder="Enter subject/teacher" required>

    <label>Period 5:</label>
    <input type="text" name="period5" placeholder="Enter subject/teacher" required>

    <input type="submit" name="submit" value="Add Timetable">
</form>

</body>
</html>
