<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | EduPulse SMS</title>
    <style>
        /* Modern aesthetic with a soft gradient */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        .splash-container {
            text-align: center;
        }

        /* The Creative "Pulse" Logo */
        .logo-circle {
            width: 100px;
            height: 100px;
            background: #3b82f6;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* Text Animations */
        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.5s;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            opacity: 0;
            animation: fadeIn 1.5s forwards 1.2s;
        }

        /* Loading Bar */
        .loader-track {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 30px auto;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: #60a5fa;
            border-radius: 10px;
            animation: loadProgress 5s linear forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(-10px); }
        }

        @keyframes loadProgress {
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="logo-circle">🎓</div>
        <h1>EduPulse</h1>
        <p>Your Gateway to Academic Excellence</p>
        
        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>
        <small style="color: #64748b;">Initializing Management System...</small>
    </div>

    <script>
        // The Magic: Redirect after exactly 5 seconds
        setTimeout(function() {
            window.location.href = "login.html";
        }, 5000);
    </script>
</body>
</html>
