<!DOCTYPE html>
<html>

<head>

<title>Student Merit List</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#002147;
color:white;
padding:20px;
text-align:center;
}

.container{
width:60%;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}

button{
background:#3498db;
color:white;
padding:12px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<header>

<h2>CBC Student Merit List Generator</h2>

</header>

<div class="container">

<form action="merit_list.php" method="GET">

<label>Class</label>
<input type="text" name="class" placeholder="Example: Grade 6">

<label>Term</label>
<select name="term">
<option value="Term 1">Term 1</option>
<option value="Term 2">Term 2</option>
<option value="Term 3">Term 3</option>
</select>

<label>Year</label>
<input type="number" name="year" placeholder="Example: 2026">

<button type="submit">Generate Merit List</button>

</form>

</div>

</body>
</html>
