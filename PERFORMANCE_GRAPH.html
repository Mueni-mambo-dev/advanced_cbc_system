<!DOCTYPE html>
<html>

<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

Student ID
<input id="student">

<button onclick="load()">Show Graph</button>

<canvas id="chart"></canvas>

<script>

function load(){

fetch("performance.php?id="+student.value)

.then(res=>res.json())
.then(data=>{

let subjects=[]
let marks=[]

data.forEach(r=>{
subjects.push(r.subject)
marks.push(r.marks)
})

new Chart(chart,{
type:'bar',
data:{
labels:subjects,
datasets:[{label:'Marks',data:marks}]
}
})

})

}

</script>

</body>
</html>
