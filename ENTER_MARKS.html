<!DOCTYPE html>
<html>

<head>

<title>CBC Enter Student Marks</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#89f7fe,#66a6ff);
}

header{
background:#002147;
color:white;
padding:20px;
text-align:center;
}

.container{
width:55%;
margin:auto;
background:white;
padding:40px;
margin-top:40px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1abc9c;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a085;
}

.footer{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h2>CBC Marks Entry System</h2>

</header>

<div class="container">

<h2>Enter Student Marks</h2>

<form action="enter_marks.php" method="POST">

<label>Student ID</label>
<input type="number" name="student_id" required>

<label>Subject</label>
<input type="text" name="subject" placeholder="Example: Mathematics" required>

<label>Marks (0 - 100)</label>
<input type="number" name="marks" min="0" max="100" required>

<label>Term</label>

<select name="term">

<option value="Term 1">Term 1</option>
<option value="Term 2">Term 2</option>
<option value="Term 3">Term 3</option>

</select>

<label>Year</label>
<input type="number" name="year" required>

<button type="submit">Save Marks</button>

</form>

<div class="footer">

<a href="VIEW_MARKS.html">View Marks Records</a>

</div>

</div>

</body>
</html>
