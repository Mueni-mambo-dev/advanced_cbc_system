<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Charts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        form {
            max-width: 500px;
            margin: 0 auto 30px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
        }
        select {
            padding: 8px;
            width: 100%;
            margin: 10px 0 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        input[type="submit"] {
            display: block;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background: #0056b3;
        }
        #chartContainer {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<h2>Student Performance Charts</h2>

<form action="charts.php" method="POST">
    <label for="student_id">Select Student:</label>
    <select name="student_id" id="student_id" required>
        <option value="">--Select Student--</option>
        <option value="1">John Doe</option>
        <option value="2">Jane Otieno</option>
        <option value="3">Mary Wanjiku</option>
    </select>

    <label for="term">Select Term:</label>
    <select name="term" id="term" required>
        <option value="">--Select Term--</option>
        <option value="Term 1">Term 1</option>
        <option value="Term 2">Term 2</option>
        <option value="Term 3">Term 3</option>
    </select>

    <label for="year">Select Year:</label>
    <select name="year" id="year" required>
        <option value="">--Select Year--</option>
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
    </select>

    <input type="submit" name="submit" value="Generate Chart">
</form>

<div id="chartContainer">
    <canvas id="performanceChart"></canvas>
</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Chart data will be filled dynamically by PHP
<?php
if(isset($_GET['data'])){
    $chartData = json_decode($_GET['data'], true);
    echo "const subjects = " . json_encode($chartData['subjects']) . ";";
    echo "const marks = " . json_encode($chartData['marks']) . ";";
}
?>
if(typeof subjects !== 'undefined' && typeof marks !== 'undefined'){
    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: subjects,
            datasets: [{
                label: 'Marks',
                data: marks,
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive:true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    });
}
</script>

</body>
</html>
