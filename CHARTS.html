<!DOCTYPE html>
<html>

<head>

<title>Class Performance Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#667eea,#764ba2);
color:white;
}

header{
background:#002147;
padding:20px;
text-align:center;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
background:white;
color:black;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
}

input,select{
padding:12px;
margin:10px;
width:28%;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
background:#1abc9c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#16a085;
}

.chart-box{
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h2>Class Performance Comparison</h2>

</header>

<div class="container">

<h2>Compare Students</h2>

<input type="text" id="class" placeholder="Class e.g Grade 6">
<input type="text" id="term" placeholder="Term e.g Term 1">
<input type="number" id="year" placeholder="Year">

<button onclick="loadChart()">Generate Chart</button>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script>

function loadChart(){

let classVal = document.getElementById("class").value;
let term = document.getElementById("term").value;
let year = document.getElementById("year").value;

fetch(`comparison.php?class=${classVal}&term=${term}&year=${year}`)

.then(res => res.json())
.then(data => {

let names = [];
let averages = [];

data.forEach(row => {
names.push(row.name);
averages.push(row.average);
});

new Chart(document.getElementById("chart"), {
type: 'bar',
data: {
labels: names,
datasets: [{
label: 'Average Marks',
data: averages
}]
}
});

});

}

</script>

</body>
</html>
