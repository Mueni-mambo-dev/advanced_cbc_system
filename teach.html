<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Teacher</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        padding: 40px;
    }
    h2 {
        text-align: center;
        color: #003366;
        margin-bottom: 30px;
    }
    form {
        max-width: 500px;
        margin: auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    label {
        font-weight: bold;
    }
    input[type="text"], input[type="email"], select {
        width: 100%;
        padding: 12px;
        margin: 12px 0 20px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    input[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #003366;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        border-radius: 6px;
    }
    input[type="submit"]:hover {
        background: #001f4d;
    }
</style>
</head>
<body>

<h2>Add Teacher</h2>

<form action="teach.php" method="POST">
    <label>Teacher Name:</label>
    <input type="text" name="name" placeholder="Enter teacher's name" required>

    <label>Teacher ID:</label>
    <input type="text" name="teacher_id" placeholder="Enter teacher ID" required>

    <label>Subject:</label>
    <input type="text" name="subject" placeholder="Enter subject" required>

    <label>Email:</label>
    <input type="email" name="email" placeholder="Enter email" required>

    <label>Phone:</label>
    <input type="text" name="phone" placeholder="Enter phone number" required>

    <input type="submit" name="submit" value="Add Teacher">
</form>

</body>
</html>
