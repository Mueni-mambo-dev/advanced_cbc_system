<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Teacher Attendance</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    padding: 40px;
}
h2 {
    text-align: center;
    color: #003366;
    margin-bottom: 30px;
}
form {
    max-width: 400px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
label {
    font-weight: bold;
}
input[type="date"], input[type="submit"] {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}
input[type="submit"] {
    background: #003366;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
input[type="submit"]:hover {
    background: #001f4d;
}
</style>
</head>
<body>

<h2>View Teacher Attendance by Date</h2>

<form action="TRS_ATTENDANCE_REPORT.php" method="POST">
    <label>Select Date:</label>
    <input type="date" name="attendance_date" required>
    <input type="submit" name="submit" value="View Attendance">
</form>

</body>
</html>
