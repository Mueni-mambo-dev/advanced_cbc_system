<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Student Profile</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        padding: 40px;
    }
    h2 {
        text-align: center;
        color: #003366;
        margin-bottom: 30px;
    }
    form {
        max-width: 500px;
        margin: auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    select, input[type="submit"] {
        width: 100%;
        padding: 12px;
        margin: 15px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    input[type="submit"] {
        background: #003366;
        color: #fff;
        border: none;
        font-size: 16px;
        cursor: pointer;
    }
    input[type="submit"]:hover {
        background: #001f4d;
    }
</style>
</head>
<body>

<h2>View Student Profile</h2>

<form action="STU_PROFILE.php" method="POST">
    <label>Select Student:</label>
    <select name="student_id" required>
        <option value="">--Select Student--</option>
        <option value="1">John Doe</option>
        <option value="2">Jane Otieno</option>
        <option value="3">Mary Wanjiku</option>
    </select>
    <input type="submit" name="submit" value="View Profile">
</form>

</body>
</html>
