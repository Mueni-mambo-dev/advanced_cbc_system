<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitere Pro | Tracking Overview</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #ffffff; margin: 0; padding: 40px; color: #0f172a; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .stat-card { border: 2px solid #f1f5f9; padding: 30px; border-radius: 35px; transition: border-color 0.3s; }
        .stat-card:hover { border-color: #4f46e5; }
        .icon-circle { width: 50px; height: 50px; background: #f8fafc; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .label { font-size: 11px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 2.5rem; font-weight: 900; margin: 5px 0; }
        .trend { font-size: 12px; font-weight: 700; color: #10b981; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: 0 auto 40px auto;">
        <h1 style="font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin: 0;">System Tracking</h1>
        <p style="color: #64748b; font-weight: 600;">Offline Assessment Metrics for Kitere Primary School.</p>
    </div>

    <div class="grid">
        <div class="stat-card">
            <div class="icon-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </div>
            <div class="label">Total Learners</div>
            <div class="value">482</div>
            <div class="trend">↑ 12% from last term</div>
        </div>

        <div class="stat-card">
            <div class="icon-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <div class="label">Completion Rate</div>
            <div class="value">94%</div>
            <div class="trend">Target: 100%</div>
        </div>

        <div class="stat-card">
            <div class="icon-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            </div>
            <div class="label">Pending Marks</div>
            <div class="value">18</div>
            <div class="trend" style="color:#ef4444">Requires Attention</div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 60px;">
        <a href="DASH.html" style="text-decoration: none; background: #0f172a; color: white; padding: 15px 40px; border-radius: 99px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;">Back to Dashboard</a>
    </div>
</body>
</html>
